<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracket Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="icon" type="image/svg+xml" href="./assets/Project_Logo.svg"/>
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <img src="./assets/Project_Logo.svg" alt="Logo" class="app-logo">
            <h1 class="app-title">Bracket Checker</h1>
        </div>
        
        <div class="header-center">
            <div id="mode-selector" class="mode-selector">
                <button class="mode-btn active" data-mode="JSON">JSON/C style Brackets</button>
                <button class="mode-btn" data-mode="HTML">HTML/XML</button>
                <button class="mode-btn" data-mode="MATH">Math</button>
            </div>
            <span id="status-badge" class="status-badge"></span>
            <select id="sample-selector" class="sample-selector">
                <option value="" disabled selected>Load Example...</option>
                <optgroup label="JSON Errors">
                    <option value="valid_json">Valid JSON</option>
                    <option value="mismatch">Mismatch</option>
                    <option value="unclosed">Unclosed</option>
                    <option value="unexpected">Unexpected</option>
                    <option value="multiple">Multiple errors</option>
                </optgroup>
                <optgroup label="Math Expressions">
                    <option value="valid_math">Valid math</option>
                    <option value="math_double_op">Double operator (1 +* 2)</option>
                    <option value="math_start_op">Starts with operator (*2 + 1)</option>
                    <option value="math_end_op">Ends with operator (1 + 2 *)</option>
                    <option value="math_paren_close">Operator before ) (1 +)</option>
                    <option value="math_missing_op">Missing operator (1(2 + 3))</option>
                    <option value="math_both">Both errors ((1 +* 2)</option>
                </optgroup>
                <optgroup label="HTML Errors">
                    <option value="valid_html">Valid HTML</option>
                    <option value="html_mismatch">Tag mismatch</option>
                    <option value="html_unclosed">Unclosed tag</option>
                    <option value="html_unexpected">Unexpected close</option>
                </optgroup>
            </select>
        </div>
        
        <div class="header-right">
            <a href="https://github.com/HA2077/BracketChecker" target="_blank" rel="noopener noreferrer" class="github-link">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.573v-2.151c-3.338.726-4.041-1.434-4.041-1.434-.546-1.389-1.333-1.757-1.333-1.757-1.089-.745.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.468-2.381 1.236-3.221-.124-.303-.535-1.524.115-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.046.138 3.003.404 2.291-1.552 3.297-1.23 3.297-1.23.65 1.652.24 2.873.119 3.176.769.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.628-5.48 5.921.43.372.823 1.102.823 2.222v3.293c0 .315.192.691.801.573 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                Star on GitHub
            </a>
        </div>
    </header>

    <main class="app-main" style="position: relative;">
        <div id="welcome-screen" class="welcome-screen">
            <img src="./assets/Project_Logo.svg" alt="Welcome Logo" class="welcome-logo">
            <h2>Welcome to Bracket Checker</h2>
            <p>Click here to start typing, or load an example from the menu.</p>
        </div>
        <div class="editor-panel">
            <div id="editor-pane"></div>
        </div>
        <div class="error-panel">
            <div id="error-pane"></div>
        </div>
    </main>

    <footer class="app-footer">
        <p class="footer-text">Made with ❤️ from HA AA AF ZW SM © 2026</p>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
